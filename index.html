<!DOCTYPE html>
<html>
<head>
  <title>Contractor Estimator</title>
  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
      padding: 50px;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <h1>Contractor Estimator 💰</h1>

  <input type="number" id="hours" placeholder="Labor Hours">
  <input type="number" id="rate" placeholder="Hourly Rate">

  <br>

  <button onclick="calculate()">Generate Estimate</button>

  <h2 id="result"></h2>

  <script>
    function calculate() {
      let hours = document.getElementById('hours').value;
      let rate = document.getElementById('rate').value;
      let total = hours * rate;
      document.getElementById('result').innerText = "Estimate: $" + total;
    }
  </script>

</body>
</html>
